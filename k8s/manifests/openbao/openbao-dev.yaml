apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
    spec:
      containers:
        - name: openbao
          image: openbao/openbao:2.5.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - bao server -dev -dev-root-token-id="$OPENBAO_ROOT_TOKEN" -dev-listen-address=0.0.0.0:8200
          ports:
            - containerPort: 8200
              name: http
          env:
            - name: OPENBAO_ROOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-root-token
                  key: token
            - name: BAO_ADDR
              value: http://127.0.0.1:8200
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: openbao
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: 8200
      nodePort: 32000
