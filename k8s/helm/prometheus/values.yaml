alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

server:
  service:
    type: NodePort
    nodePort: 32091
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 8Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 800m
      memory: 1Gi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
