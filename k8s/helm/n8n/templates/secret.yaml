apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-secret
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
stringData:
  N8N_BASIC_AUTH_USER: {{ required "secrets.basicAuthUser is required" .Values.secrets.basicAuthUser | quote }}
  N8N_BASIC_AUTH_PASSWORD: {{ required "secrets.basicAuthPassword is required" .Values.secrets.basicAuthPassword | quote }}
  N8N_ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required" .Values.secrets.encryptionKey | quote }}
